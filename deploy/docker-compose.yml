# ongrid local dev compose.
# NOT for production. See deploy/README.md and HLD-001 section 9 for production notes.
# Modern compose: no top-level `version:` key.
#
# Post-pivot stack: MySQL is the default backend. The ongrid service waits
# for the mysql healthcheck before it starts connecting. SQLite remains an
# opt-in backend for local tinkering (see deploy/README.md).
#
# Tunnel topology (ADR-007): edges dial the upstream singchia/frontier
# broker on port 40012 (mapped to host 40012). Manager connects to the
# broker's service-bound port 40011 over the compose network.

services:
  mysql:
    image: mysql:8.0
    container_name: ongrid-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: ongrid
      MYSQL_USER: ongrid
      MYSQL_PASSWORD: ongrid
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -prootpw"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks:
      - ongrid_net

  ongrid:
    build:
      # Build context is the repo root so the Dockerfile (which lives in
      # deploy/) can see go.mod, cmd/, internal/, etc.
      context: ..
      dockerfile: deploy/Dockerfile.ongrid
      args:
        VERSION: ${VERSION:-dev}
    image: ongrid:${VERSION:-dev}
    container_name: ongrid
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      ONGRID_HTTP_ADDR: ${ONGRID_HTTP_ADDR:-:8080}
      ONGRID_METRICS_ADDR: ${ONGRID_METRICS_ADDR:-:9100}
      # Frontier broker (upstream singchia/frontier). Manager dials the
      # service-bound port over the compose network.
      ONGRID_FRONTIER_ADDR: ${ONGRID_FRONTIER_ADDR:-frontier:40011}
      ONGRID_FRONTIER_SERVICE_NAME: ${ONGRID_FRONTIER_SERVICE_NAME:-ongrid-manager}
      # Database (MySQL by default). Point at the mysql service on the
      # compose network; the ongrid service waits for the healthcheck.
      ONGRID_DB_DIALECT: ${ONGRID_DB_DIALECT:-mysql}
      ONGRID_DB_DSN: ${ONGRID_DB_DSN:-ongrid:ongrid@tcp(mysql:3306)/ongrid?parseTime=true&charset=utf8mb4&loc=Local}
      ONGRID_JWT_SECRET: ${ONGRID_JWT_SECRET:-change-me-to-a-long-random-string}
      # HLD-017 credential vault at-rest key (AES-256-GCM); set 32+ random chars.
      ONGRID_SECRET_KEY: ${ONGRID_SECRET_KEY:-}
      ONGRID_JWT_ACCESS_TTL: ${ONGRID_JWT_ACCESS_TTL:-15m}
      ONGRID_JWT_REFRESH_TTL: ${ONGRID_JWT_REFRESH_TTL:-168h}
      ONGRID_OPENAI_API_KEY: ${ONGRID_OPENAI_API_KEY:-}
      ONGRID_OPENAI_MODEL: ${ONGRID_OPENAI_MODEL:-gpt-4o}
      ONGRID_OPENAI_BASE_URL: ${ONGRID_OPENAI_BASE_URL:-}
      # AIOps agent kernel. "graph" enables the eino graph kernel +
      # SkillRegistry.Resolve activation-keyword filter (skills with
      # activation:keyword stay out of the prompt unless the user query
      # mentions a keyword) + ToolBag deferral pipeline. "legacy" =
      # historical for-loop runner with all tools always full-schema.
      # Default flipped to graph 2026-05-08; flip to legacy to bisect.
      ONGRID_AGENT_KERNEL: ${ONGRID_AGENT_KERNEL:-graph}
      # ToolBag deferral threshold. When tool count > this, specialty-tier
      # tools get redacted schemas (LLM must call ToolSearch to expand).
      # Default 30 is fine until marketplace grows the bag past it.
      ONGRID_TOOLBAG_DEFERRAL_THRESHOLD: ${ONGRID_TOOLBAG_DEFERRAL_THRESHOLD:-30}
      # ADR-009: cloud-side Prometheus. Manager remote_writes open-set
      # samples here and the aiops query_promql tool reads from it.
      ONGRID_PROM_ENABLED: ${ONGRID_PROM_ENABLED:-true}
      ONGRID_PROM_URL: ${ONGRID_PROM_URL:-http://prometheus:9090/prometheus}
      ONGRID_PROM_REMOTE_WRITE_URL: ${ONGRID_PROM_REMOTE_WRITE_URL:-}
      ONGRID_PROM_QUERY_URL: ${ONGRID_PROM_QUERY_URL:-http://prometheus:9090/prometheus}
      # Knowledge base / RAG: local BGE embedding + qdrant. This mirrors
      # the install package default so the dev stack has KB search without
      # an external embedding API key.
      ONGRID_QDRANT_URL: ${ONGRID_QDRANT_URL:-http://qdrant:6333}
      ONGRID_EMBEDDING_PROVIDER: ${ONGRID_EMBEDDING_PROVIDER:-local}
      ONGRID_EMBEDDING_MODEL: ${ONGRID_EMBEDDING_MODEL:-bge-small-zh-v1.5}
      ONGRID_EMBEDDING_DIM: ${ONGRID_EMBEDDING_DIM:-512}
      ONGRID_EMBEDDING_BASE_URL: ${ONGRID_EMBEDDING_BASE_URL:-}
      ONGRID_EMBEDDING_API_KEY: ${ONGRID_EMBEDDING_API_KEY:-}
      ONGRID_EMBEDDING_CACHE_DIR: ${ONGRID_EMBEDDING_CACHE_DIR:-/var/lib/ongrid/embeddings}
      # Optional pip index mirror for cloud_bash runtime tool installs (empty =
      # pypi). Set to a regional mirror where pypi.org is slow.
      ONGRID_PIP_INDEX_URL: ${ONGRID_PIP_INDEX_URL:-}
      ONNX_PATH: /usr/lib/libonnxruntime.so
      # Embedded Grafana first-boot integration. The manager uses the
      # dev-only admin creds below to create an ongrid Service Account +
      # token, then stores the token in system_settings.grafana.sa_token.
      # Override/blank the password when pointing at an external Grafana.
      ONGRID_GRAFANA_INTERNAL_URL: ${ONGRID_GRAFANA_INTERNAL_URL:-http://grafana:3000/grafana}
      ONGRID_GRAFANA_BOOTSTRAP_USER: ${ONGRID_GRAFANA_BOOTSTRAP_USER:-${GRAFANA_ADMIN_USER:-admin}}
      ONGRID_GRAFANA_BOOTSTRAP_PASSWORD: ${ONGRID_GRAFANA_BOOTSTRAP_PASSWORD-${GRAFANA_ADMIN_PASSWORD:-admin}}
      ONGRID_GRAFANA_TLS_INSECURE: ${ONGRID_GRAFANA_TLS_INSECURE:-false}
      # Public URL the manager hands out to edges as the data-plane
      # endpoint for plugin telemetry (ADR-014 / ADR-015).
      ONGRID_PUBLIC_URL: ${ONGRID_PUBLIC_URL:-}
      # Built-in host alert thresholds over push_host_metrics.
      ONGRID_ALERT_ENABLED: ${ONGRID_ALERT_ENABLED:-true}
      ONGRID_ALERT_COOLDOWN: ${ONGRID_ALERT_COOLDOWN:-10m}
      ONGRID_ALERT_CPU_PERCENT: ${ONGRID_ALERT_CPU_PERCENT:-90}
      ONGRID_ALERT_MEM_PERCENT: ${ONGRID_ALERT_MEM_PERCENT:-90}
      ONGRID_ALERT_DISK_USED_PERCENT: ${ONGRID_ALERT_DISK_USED_PERCENT:-90}
      ONGRID_ALERT_LOAD1: ${ONGRID_ALERT_LOAD1:-0}
      # Outbound notifications for alerts / scheduled jobs / proactive AIOps.
      ONGRID_NOTIFY_ENABLED: ${ONGRID_NOTIFY_ENABLED:-false}
      ONGRID_NOTIFY_DEFAULT_CHANNELS: ${ONGRID_NOTIFY_DEFAULT_CHANNELS:-log}
      ONGRID_NOTIFY_TIMEOUT: ${ONGRID_NOTIFY_TIMEOUT:-10s}
      ONGRID_NOTIFY_LOG_ENABLED: ${ONGRID_NOTIFY_LOG_ENABLED:-true}
      ONGRID_NOTIFY_LOG_NAME: ${ONGRID_NOTIFY_LOG_NAME:-log}
      ONGRID_NOTIFY_WEBHOOK_ENABLED: ${ONGRID_NOTIFY_WEBHOOK_ENABLED:-false}
      ONGRID_NOTIFY_WEBHOOK_NAME: ${ONGRID_NOTIFY_WEBHOOK_NAME:-webhook}
      ONGRID_NOTIFY_WEBHOOK_URL: ${ONGRID_NOTIFY_WEBHOOK_URL:-}
      ONGRID_NOTIFY_WEBHOOK_SECRET: ${ONGRID_NOTIFY_WEBHOOK_SECRET:-}
      ONGRID_NOTIFY_SLACK_ENABLED: ${ONGRID_NOTIFY_SLACK_ENABLED:-false}
      ONGRID_NOTIFY_SLACK_NAME: ${ONGRID_NOTIFY_SLACK_NAME:-slack}
      ONGRID_NOTIFY_SLACK_WEBHOOK_URL: ${ONGRID_NOTIFY_SLACK_WEBHOOK_URL:-}
      ONGRID_NOTIFY_FEISHU_ENABLED: ${ONGRID_NOTIFY_FEISHU_ENABLED:-false}
      ONGRID_NOTIFY_FEISHU_NAME: ${ONGRID_NOTIFY_FEISHU_NAME:-feishu}
      ONGRID_NOTIFY_FEISHU_WEBHOOK_URL: ${ONGRID_NOTIFY_FEISHU_WEBHOOK_URL:-}
      ONGRID_NOTIFY_FEISHU_SECRET: ${ONGRID_NOTIFY_FEISHU_SECRET:-}
      ONGRID_NOTIFY_DINGTALK_ENABLED: ${ONGRID_NOTIFY_DINGTALK_ENABLED:-false}
      ONGRID_NOTIFY_DINGTALK_NAME: ${ONGRID_NOTIFY_DINGTALK_NAME:-dingtalk}
      ONGRID_NOTIFY_DINGTALK_WEBHOOK_URL: ${ONGRID_NOTIFY_DINGTALK_WEBHOOK_URL:-}
      ONGRID_NOTIFY_DINGTALK_SECRET: ${ONGRID_NOTIFY_DINGTALK_SECRET:-}
      # Bootstrap admin. If either is empty, no admin is seeded and the
      # server starts with zero users (nobody can log in — see "First login"
      # in deploy/README.md).
      ONGRID_ADMIN_EMAIL: ${ONGRID_ADMIN_EMAIL:-}
      ONGRID_ADMIN_PASSWORD: ${ONGRID_ADMIN_PASSWORD:-}
    # No ./data bind mount in MySQL mode (data lives in the mysql_data
    # named volume on the mysql service).
    # if switching to sqlite: add bind mount here
    #   volumes:
    #     - ./data:/data
    #   and set ONGRID_DB_DIALECT=sqlite, ONGRID_DB_PATH=/data/ongrid.db.
    volumes:
      # ADR-024 edge upgrade bundles. ./edge holds edge-bundle-<arch>-
      # <ver>.tar.gz + .tar.gz.sha256 (placed there by install.sh /
      # upgrade.sh from the release tarball). Manager reads the .sha256
      # at upgrade-trigger time to build the FetchPackageRequest;
      # nginx (ongrid-web) serves the .tar.gz bytes from the same dir
      # via /edge/<name>.
      - ./edge:/usr/share/ongrid/edge-bundles:ro
      - ../.cache/embedding-models:/var/lib/ongrid/embeddings
      # HLD-017 cloud skill marketplace: persist user-installed skills so
      # they survive container recreation (bind-mount, not container layer).
      - ../.cache/ongrid-skills:/var/lib/ongrid/skills
      # HLD-019 agent workspace: per-session persistent cwd for cloud_bash.
      - ../.cache/ongrid-workspace:/var/lib/ongrid/workspace
      # cloud_bash tools: host-mounted PYTHONUSERBASE + <dir>/bin on PATH, so
      # CLIs the agent installs (tccli, awscli, …) persist on the host across
      # container recreation instead of being baked into the image.
      - ../.cache/ongrid-tools:/var/lib/ongrid/tools
    # ADR-008: HTTP API (8080) is no longer published to host in the
    # production-shape stack — nginx fronts it on 443/80. Metrics port
    # 9100 stays exposed for the host's Prometheus.
    ports:
      - "9100:9100"
    networks:
      - ongrid_net

  # ADR-008: TLS termination + frontend SPA + /api reverse proxy. Same
  # shape as deploy/install/docker-compose.yml; suitable for local dev.
  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        VERSION: ${VERSION:-dev}
    image: ongrid-web:${VERSION:-dev}
    container_name: ongrid-nginx
    restart: unless-stopped
    depends_on:
      ongrid:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      # Public edge artifact dir for /install.sh + /edge/<file>.
      - ../bin:/usr/share/nginx/html/edge:ro
    ports:
      - "${ONGRID_HTTP_PORT:-443}:443"
      - "${ONGRID_HTTP_REDIRECT_PORT:-80}:80"
    networks:
      - ongrid_net

  frontier:
    # Upstream broker (ADR-007). No build stanza — image pulled from
    # Docker Hub. Edge-bound port 40012 is exposed on host:40012 so the
    # tunnel endpoint URL stays identical to pre-split deployments.
    image: singchia/frontier:1.2.5
    container_name: ongrid-frontier
    restart: unless-stopped
    volumes:
      - ./install/frontier.yaml:/usr/conf/frontier.yaml:ro
    ports:
      - "40012:40012"
    networks:
      - ongrid_net

  # ADR-009: cloud-side Prometheus. Core service for the dev stack — same
  # role as in deploy/install/docker-compose.yml (remote_write receiver +
  # query backend for the aiops query_promql tool). Dev publishes 9090 to
  # host so you can poke PromQL from the laptop browser; prod doesn't.
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: ongrid-prometheus
    restart: unless-stopped
    depends_on:
      - ongrid
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=90d
      - --storage.tsdb.retention.size=20GB
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
      - --web.external-url=/prometheus/
      - --web.route-prefix=/prometheus/
    # Phase-A unblock: let the prometheus.yml `node-exporter-host` job
    # resolve `host.docker.internal` on Linux too. Docker Desktop already
    # provides this name; on Linux the docker-engine resolves the special
    # value `host-gateway` to the docker0 bridge address. Set
    # ONGRID_HOST_GATEWAY to the docker bridge IP on older engines.
    extra_hosts:
      - "host.docker.internal:${ONGRID_HOST_GATEWAY:-host-gateway}"
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - ongrid_net

  # Loki (ADR-012). Single-binary log backend, only docker-internal port
  # 3100 — public access flows through nginx /loki/api/v1/push with
  # auth_request → manager edgeauth (ADR-014 §决策).
  loki:
    image: grafana/loki:3.4.0
    container_name: ongrid-loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - ./install/loki-config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - ongrid_net

  # Tempo (ADR-013). Single-binary trace backend; OTLP gRPC :4317 and
  # HTTP :4318 are intentionally NOT published — public access flows
  # through nginx /v1/traces with auth_request → manager edgeauth
  # (ADR-014 §决策第 1 条).
  tempo:
    image: grafana/tempo:2.5.0
    container_name: ongrid-tempo
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/tempo.yaml
    volumes:
      - tempo_data:/var/tempo
      - ./install/tempo-config.yaml:/etc/tempo/tempo.yaml:ro
    depends_on:
      - prometheus
    networks:
      - ongrid_net

  # SearXNG (default backend for the manager-scoped web_search skill).
  # Self-hosted meta-search aggregator — fans out queries to Bing /
  # DuckDuckGo / Brave / Baidu / Sogou and returns a normalised JSON
  # response. Zero API key, zero quota. Only docker-internal port 8080
  # — manager reaches it at http://searxng:8080/search?q=...&format=json.
  searxng:
    image: searxng/searxng:latest
    container_name: ongrid-searxng
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      INSTANCE_NAME: ongrid-search
    volumes:
      - ./searxng:/etc/searxng:ro
    networks:
      - ongrid_net

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: ongrid-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ongrid_net

  grafana:
    image: grafana/grafana-oss:11.1.4
    container_name: ongrid-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SERVER_ROOT_URL: ${ONGRID_GRAFANA_ROOT_URL:-%(protocol)s://%(domain)s/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # Local-dev only: fixed admin credentials let the manager bootstrap
      # a Grafana Service Account token automatically. Production install
      # uses deploy/install with a generated random password.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: system
      # Default UI language for anonymous viewers. Without this the
      # Grafana picker follows Accept-Language → a CN-zh browser sees
      # Chinese even when the ongrid product UI is in EN mode. We pin
      # en-US as the fallback; the web/drilldown URL builder also
      # appends ?lang=zh-Hans / en-US so the per-tab locale follows
      # the product UI on Grafana 11.x where the param is honored.
      GF_USERS_DEFAULT_LANGUAGE: en-US
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # iframe embedding for ongrid /monitor solo-mode panels. Default
      # Grafana sets X-Frame-Options=deny + frame-ancestors=none which
      # blocks our iframes. We're same-origin (under /grafana on the
      # same nginx) so the security cost is essentially zero, and the
      # nginx auth_request gate stays in front.
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Datasource provisioning URLs (loki / tempo). Grafana doesn't
      # support shell-style ${VAR:-default} in YAML — set the default
      # here so the provisioning yamls can use plain ${VAR}.
      ONGRID_LOG_URL: ${ONGRID_LOG_URL:-http://loki:3100}
      ONGRID_TRACE_QUERY_URL: ${ONGRID_TRACE_QUERY_URL:-http://tempo:3200}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - ongrid_net

# ---------------------------------------------------------------------------
# ongrid-edge is intentionally NOT defined here — in real deployments the
# edge agent runs on the user's own host, not on the cloud side. If you want
# to spin up a local demo edge for development, uncomment the stanza below
# and make sure ONGRID_EDGE_CLOUD_ADDR points at the frontier service on the
# compose network (`frontier:40012`).
#
#  ongrid-edge:
#    build:
#      context: ..
#      dockerfile: deploy/Dockerfile.ongrid-edge
#      args:
#        VERSION: ${VERSION:-dev}
#    image: ongrid-edge:${VERSION:-dev}
#    container_name: ongrid-edge
#    restart: unless-stopped
#    depends_on:
#      - frontier
#    environment:
#      ONGRID_EDGE_CLOUD_ADDR: ${ONGRID_EDGE_CLOUD_ADDR:-frontier:40012}
#      ONGRID_EDGE_ACCESS_KEY: ${ONGRID_EDGE_ACCESS_KEY:-}
#      ONGRID_EDGE_SECRET_KEY: ${ONGRID_EDGE_SECRET_KEY:-}
#    networks:
#      - ongrid_net

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
  qdrant_data:
  loki_data:
  tempo_data:

networks:
  ongrid_net:
    driver: bridge
